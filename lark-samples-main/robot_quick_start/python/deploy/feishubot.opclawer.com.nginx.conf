# Nginx: feishubot.opclawer.com -> Gunicorn on 127.0.0.1:3000
#
# Before this works:
# 1) DNS: add A record  feishubot.opclawer.com -> your server public IP
# 2) Gunicorn must listen: 127.0.0.1:3000 (see systemd unit in this folder)
# 3) Install TLS, e.g.:
#    sudo certbot --nginx -d feishubot.opclawer.com
#
# Install (example paths on CentOS/Alibaba Linux):
#   sudo cp feishubot.opclawer.com.nginx.conf /etc/nginx/conf.d/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Feishu event subscription URL:
#   https://feishubot.opclawer.com/

server {
    listen 80;
    listen [::]:80;
    server_name feishubot.opclawer.com;

    # After certbot, it will add listen 443 ssl; and certificate paths, or use:
    # certbot --nginx -d feishubot.opclawer.com

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        client_max_body_size 20m;
    }
}
